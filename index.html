<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Synchronously apply stored theme before first paint to prevent flash.
         Always set explicitly (light unless "dark" was stored) so useDarkMode
         can trust colorScheme even on pages without the navbar. -->
    <script>
      try {
        var t = localStorage.getItem('theme');
        document.documentElement.style.colorScheme =
          (t === '"dark"' || t === 'dark') ? 'dark' : 'light';
      } catch (e) {
        document.documentElement.style.colorScheme = 'light';
      }
    </script>
    <link rel="icon" type="image/png" href="/r-logo.png" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900&display=swap")
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RD Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
